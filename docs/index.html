<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Goosse Dialog – Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <!-- Goosse Dialog CSS -->
    <link rel="stylesheet" href="../dialog.css">
</head>

<body class="p-4">

<div class="container">
    <h1 class="mb-4">Goosse Dialog – Demo</h1>

    <p class="text-muted">
        Demonstration of the Goosse Dialog module using plain JavaScript and
        Bootstrap 5.
    </p>

    <div class="d-flex flex-wrap gap-2 mt-4">

        <button class="btn btn-info" id="btn-info">
            Info dialog
        </button>

        <button class="btn btn-warning" id="btn-warning">
            Warning dialog
        </button>

        <button class="btn btn-danger" id="btn-danger">
            Danger dialog
        </button>

        <button class="btn btn-success" id="btn-success">
            Success dialog
        </button>

    </div>
</div>

<!-- Bootstrap JS -->
<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Goosse Dialog JS -->
<script src="../dialog.js"></script>

<!-- Demo logic -->
<script src="demo.js"></script>

</body>
</html>
